<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamTV — Прямые эфиры</title>
<title>streamtvlive.github.io</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c14;--bg2:#0d1220;--bg3:#141926;--bg4:#1a2133;
    --accent:#e8303a;--text:#f0f4ff;--text2:#8a9bb8;--text3:#4a5a7a;
    --border:#1e2a40;--glow:rgba(232,48,58,.35);
    --sidebar:300px;--header:60px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

  header{height:var(--header);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;z-index:100}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .logo span{color:var(--accent)}
  .logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);animation:blink 1.5s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.75)}}
  .h-search{flex:1;max-width:320px;position:relative}
  .h-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Manrope',sans-serif;font-size:13px;padding:8px 12px 8px 34px;outline:none;transition:border-color .2s}
  .h-search input:focus{border-color:var(--accent)}
  .h-search input::placeholder{color:var(--text3)}
  .h-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
  .h-tabs{display:flex;gap:4px;margin-left:auto}
  .htab{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;color:var(--text2);background:none;transition:all .2s}
  .htab:hover{background:var(--bg3);color:var(--text)}
  .htab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .type-filter{display:flex;gap:6px}
  .type-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);transition:all .2s;white-space:nowrap}
  .type-btn:hover{background:var(--bg4);color:var(--text)}
  .type-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(232,48,58,.08)}

  .main{display:flex;flex:1;overflow:hidden}

  .sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
  .sb-head{padding:12px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .sb-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
  .sb-count{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:20px}
  .ch-list{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
  .ch-list::-webkit-scrollbar{width:4px}
  .ch-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
  .ch-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:2px}
  .ch-item:hover{background:var(--bg3)}
  .ch-item.on{background:var(--bg4);border-color:var(--accent)}
  .ch-logo{width:44px;height:30px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:9px;font-weight:700;color:var(--text3);text-align:center;line-height:1.2}
  .ch-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
  .ch-info{flex:1;min-width:0}
  .ch-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch-sub{font-size:11px;color:var(--text3);margin-top:1px}
  .pip-live{width:6px;height:6px;background:#3dd68c;border-radius:50%;flex-shrink:0;box-shadow:0 0 5px #3dd68c}
  .pip-off{width:6px;height:6px;background:var(--text3);border-radius:50%;flex-shrink:0}

  .content{flex:1;display:flex;flex-direction:column;overflow:hidden}

  /* GRID */
  .grid-wrap{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
  .grid-wrap::-webkit-scrollbar{width:6px}
  .grid-wrap::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
  .sec-lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
  .ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:28px}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .card-thumb{height:88px;background:var(--bg4);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .card-thumb img{max-width:72%;max-height:64%;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
  .card-fb{color:var(--text3);font-size:11px;font-weight:700;text-align:center;padding:4px}
  .play-ov{position:absolute;inset:0;background:rgba(232,48,58,0);display:flex;align-items:center;justify-content:center;transition:background .2s}
  .card:hover .play-ov{background:rgba(232,48,58,.18)}
  .play-ic{width:36px;height:36px;border-radius:50%;background:rgba(232,48,58,.9);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.7);transition:all .2s;box-shadow:0 0 16px var(--glow)}
  .card:hover .play-ic{opacity:1;transform:scale(1)}
  .live-badge{position:absolute;top:7px;right:7px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px}
  .live-badge.off{background:var(--bg4);color:var(--text3)}
  .radio-badge{position:absolute;top:7px;left:7px;background:rgba(61,214,140,.12);color:#3dd68c;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;border:1px solid rgba(61,214,140,.3)}
  .card-body{padding:9px 11px}
  .card-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-owner{font-size:11px;color:var(--text3);margin-top:2px}

  /* PLAYER */
  .player-view{display:flex;flex-direction:column;height:100%;overflow:hidden}

  .player-top{flex-shrink:0;background:#000;position:relative}
  .embed-wrap{width:100%;padding-bottom:56.25%;height:0;position:relative}
  .embed-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

  /* SOURCE SWITCHER — как на smotret.tv */
  .source-bar{
    display:flex;align-items:center;gap:8px;
    padding:8px 16px;
    background:var(--bg2);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .source-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);white-space:nowrap}
  .src-btn{
    padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;
    cursor:pointer;border:1px solid var(--border);
    background:var(--bg3);color:var(--text2);
    transition:all .2s;display:flex;align-items:center;gap:6px;
  }
  .src-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--text3)}
  .src-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .src-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7}

  .pib{padding:10px 18px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
  .pib-logo{width:46px;height:32px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:9px;font-weight:700;color:var(--text3)}
  .pib-logo img{width:100%;height:100%;object-fit:contain;padding:4px}
  .pib-name{font-size:16px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pib-owner{font-size:12px;color:var(--text3);flex-shrink:0}
  .pib-live{background:var(--accent);color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:4px;display:flex;align-items:center;gap:5px;flex-shrink:0}
  .pib-live::before{content:'';width:6px;height:6px;background:#fff;border-radius:50%;animation:blink 1s infinite}
  .pib-off{background:var(--bg4);color:var(--text3);font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;flex-shrink:0}

  .p-related{flex:1;overflow-y:auto;padding:14px 18px;background:var(--bg2)}

  .state-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text3)}
  .loader{width:38px;height:38px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .no-ch{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3)}
  .no-ch-icon{width:76px;height:76px;border:2px dashed var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
  .no-ch h3{color:var(--text2);font-size:15px}

  @media(max-width:700px){:root{--sidebar:220px}.h-search,.type-filter{display:none}}
  @media(max-width:520px){.sidebar{display:none}.content{width:100%}}
</style>
</head>

  // Сначала грузим хардкод — мгновенно
  processChannels(HARDCODED);

  // Потом пробуем свежие данные с API в фоне
  fetch(API_URL, { method:'GET', headers:{'Accept':'application/json'} })
    .then(r => r.json())
    .then(json => {
      const list = extractList(json);
      console.log('API fresh data:', list.length, 'channels');
      processChannels(list);
      const tp = json.pagination?.total_pages || 1;
      if (tp > 1) loadRestPages(tp);
    })
    .catch(e => console.warn('API fetch failed (using hardcoded):', e.message));

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQ = e.target.value.toLowerCase().trim();
    applyFilters();
  });
};

async function loadRestPages(total) {
  for (let p = 2; p <= total; p++) {
    await new Promise(r => setTimeout(r, 500));
    fetch(`${API_URL}?page=${p}&limit=50`, { method:'GET', headers:{'Accept':'application/json'} })
      .then(r => r.json())
      .then(json => processChannels(extractList(json)))
      .catch(() => {});
  }
}

function extractList(json) {
  if (Array.isArray(json)) return json;
  for (const k of ['data','channels','items','results','list','streams']) {
    if (Array.isArray(json[k])) return json[k];
  }
  return [];
}

function processChannels(list) {
  const ALLOW_NAMES = ['oinktech','twixoff'];
  const fresh = list
    .filter(ch => {
      const u = (ch.owner?.username || ch.owner || '').toLowerCase();
      return ALLOW_NAMES.some(a => u.includes(a));
    })
    .filter(ch => {
      if (seenIds.has(ch.id)) return false;
      seenIds.add(ch.id);
      return true;
    })
    .map(ch => ({
      id:    ch.id,
      name:  (ch.title || ch.name || 'Без названия').trim(),
      thumb: ch.thumbnail_url || ch.logo || ch.thumb || '',
      type:  ch.channel_type || ch.type || 'tv',
      live:  !!(ch.is_live || ch.live),
      owner: (typeof ch.owner==='object' ? ch.owner?.username : ch.owner) || '',
    }));

  if (!fresh.length) return;
  allCh.push(...fresh);
  applyFilters();
  if (!currentCh && allCh.length > 0) currentCh = allCh[0];
}

// ════════════════════════════════════════
//  FILTERS
// ════════════════════════════════════════
function applyFilters() {
  view = allCh.filter(ch => {
    if (typeF !== 'all' && ch.type !== typeF) return false;
    if (searchQ && !ch.name.toLowerCase().includes(searchQ)) return false;
    return true;
  });
  document.getElementById('sbCount').textContent = view.length;
  renderSidebar();
  if (curView === 'grid') renderGrid();
}

function setType(btn, t) {
  typeF = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  applyFilters();
}

// ════════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════════
function renderSidebar() {
  const el = document.getElementById('chList');
  el.innerHTML = '';
  view.forEach(ch => {
    const d = document.createElement('div');
    d.className = 'ch-item' + (currentCh?.id === ch.id ? ' on' : '');
    d.dataset.id = ch.id;
    d.innerHTML = `
      <div class="ch-logo">${ch.thumb
        ? `<img src="${esc(ch.thumb)}" onerror="this.style.display='none'">`
        : esc(ch.name.slice(0,4))}</div>
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-sub">${ch.type==='radio'?'📻':'📺'} · ${esc(ch.owner)}</div>
      </div>
      <div class="${ch.live?'pip-live':'pip-off'}"></div>`;
    d.onclick = () => { play(ch); switchView('player'); };
    el.appendChild(d);
  });
}

// ════════════════════════════════════════
//  GRID
// ════════════════════════════════════════
function renderGrid() {
  const c = document.getElementById('content');
  if (curView !== 'grid') return;
  c.innerHTML = '';
  const w = document.createElement('div');
  w.className = 'grid-wrap';

  if (!view.length) {
    w.innerHTML = '<div class="state-screen"><span>Ничего не найдено</span></div>';
    c.appendChild(w); return;
  }

  const live  = view.filter(ch => ch.live);
  const tv    = view.filter(ch => !ch.live && ch.type==='tv');
  const radio = view.filter(ch => !ch.live && ch.type==='radio');
  [['🔴 В эфире',live],['📺 Телеканалы',tv],['📻 Радиостанции',radio]]
    .filter(([,items]) => items.length)
    .forEach(([label,items]) => {
      const lbl = document.createElement('div');
      lbl.className = 'sec-lbl'; lbl.textContent = label;
      w.appendChild(lbl);
      const g = document.createElement('div');
      g.className = 'ch-grid';
      items.forEach(ch => g.appendChild(makeCard(ch)));
      w.appendChild(g);
    });

  c.appendChild(w);
}

function makeCard(ch) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-thumb">
      ${ch.thumb ? `<img src="${esc(ch.thumb)}" onerror="this.remove()">` : `<div class="card-fb">${esc(ch.name.slice(0,6))}</div>`}
      <div class="play-ov"><div class="play-ic">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div></div>
      <div class="live-badge ${ch.live?'':'off'}">${ch.live?'LIVE':'OFFLINE'}</div>
      ${ch.type==='radio'?'<div class="radio-badge">RADIO</div>':''}
    </div>
    <div class="card-body">
      <div class="card-name">${esc(ch.name)}</div>
      <div class="card-owner">${esc(ch.owner)}</div>
    </div>`;
  card.onclick = () => { play(ch); switchView('player'); };
  return card;
}

// ════════════════════════════════════════
//  PLAYER
// ════════════════════════════════════════
function play(ch) {
  currentCh = ch;
  document.querySelectorAll('.ch-item').forEach(el =>
    el.classList.toggle('on', el.dataset.id === ch.id));
  if (curView === 'player') renderPlayer(ch);
}

function renderPlayer(ch) {
  const c = document.getElementById('content');
  const src = SOURCES[currentSource];
  const embedUrl = src.url(ch.id);

  c.innerHTML = `
    <div class="player-view">
      <div class="player-top">
        <div class="embed-wrap">
          <iframe id="embedFrame"
            src="${esc(embedUrl)}"
            allowfullscreen
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </div>

      <!-- SOURCE SWITCHER -->
      <div class="source-bar">
        <span class="source-label">Источник:</span>
        ${SOURCES.map((s,i) => `
          <button class="src-btn ${i===currentSource?'on':''}" onclick="switchSource(${i})">
            <span class="src-dot"></span>${esc(s.label)}
          </button>`).join('')}
      </div>

      <div class="pib">
        <div class="pib-logo">${ch.thumb
          ? `<img src="${esc(ch.thumb)}" onerror="this.style.display='none'">`
          : esc(ch.name.slice(0,3))}</div>
        <div class="pib-name">${esc(ch.name)}</div>
        <div class="pib-owner">@${esc(ch.owner)}</div>
        <div class="${ch.live?'pib-live':'pib-off'}">${ch.live?'LIVE':'OFFLINE'}</div>
      </div>

      <div class="p-related">
        <div class="sec-lbl">Другие каналы</div>
        <div class="ch-grid" id="relGrid"></div>
      </div>
    </div>`;

  renderRelated(ch);
}

function switchSource(idx) {
  currentSource = idx;
  // Просто обновляем iframe src и кнопки
  const frame = document.getElementById('embedFrame');
  if (frame && currentCh) {
    frame.src = SOURCES[idx].url(currentCh.id);
  }
  document.querySelectorAll('.src-btn').forEach((b,i) =>
    b.classList.toggle('on', i === idx));
}

function renderRelated(current) {
  const el = document.getElementById('relGrid');
  if (!el) return;
  view.filter(c => c.id !== current.id).slice(0,12).forEach(ch => el.appendChild(makeCard(ch)));
}

// ════════════════════════════════════════
//  VIEW / STATE
// ════════════════════════════════════════
function switchView(v) {
  curView = v;
  document.getElementById('tabGrid').classList.toggle('on', v==='grid');
  document.getElementById('tabPlayer').classList.toggle('on', v==='player');
  if (v==='grid') renderGrid();
  else if (currentCh) renderPlayer(currentCh);
  else showNoCh();
}

function showNoCh() {
  document.getElementById('content').innerHTML = `
    <div class="no-ch">
      <div class="no-ch-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/>
        </svg>
      </div>
      <h3>Выберите канал</h3><p>Нажмите на любой канал</p>
    </div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
